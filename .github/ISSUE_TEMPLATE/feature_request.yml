name: Feature request
description: Suggest an idea or improvement for cairn
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? What's the use case?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What you'd like to see happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about, and why they fall short.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Which area does this touch?
      description: The source or collection most relevant to this request.
      options:
        - claude-code-sessions
        - codex-sessions
        - cursor-sessions
        - granola-sessions
        - service-docs
        - recall / search
        - sync / config / cron
        - other / not sure
    validations:
      required: true
